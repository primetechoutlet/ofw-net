<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFW-NET Staff Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1628 0%, #0f1f3a 25%, #142a4a 50%, #0f1f3a 75%, #0a1628 100%);
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(74,141,183,0.15);
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .brand { font-size: 28px; font-weight: 800; color: #e8f0f8; }
        .brand span { color: #5ba3d9; }
        .brand-sub { font-size: 12px; color: #5a7a9a; letter-spacing: 2px; text-transform: uppercase; }
        .status-total { color: #5a7a9a; font-size: 14px; }
        .status-total span { color: #5ba3d9; font-weight: 700; }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn-log {
            background: linear-gradient(135deg, #1a4a6a, #2a6a9a);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(42, 106, 154, 0.2);
            letter-spacing: 0.5px;
        }
        .btn-log:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(42, 106, 154, 0.4);
        }
        
        .notification-badge {
            background: rgba(232, 116, 106, 0.2);
            border: 1px solid rgba(232, 116, 106, 0.3);
            color: #e8746a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            animation: lockPulse 1s infinite;
        }
        @keyframes lockPulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .pc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .pc-card {
            background: rgba(10,22,40,0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(74,141,183,0.12);
            transition: all 0.3s ease;
        }
        .pc-card:hover { border-color: rgba(74,141,183,0.25); transform: translateY(-2px); }
        .pc-card .pc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .pc-card .pc-name { font-size: 20px; font-weight: 700; color: #e8f0f8; }
        .pc-card .pc-status {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .pc-status.idle { background: rgba(90,122,154,0.15); color: #5a7a9a; border: 1px solid rgba(90,122,154,0.2); }
        .pc-status.running { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .pc-status.locked { background: rgba(232,116,106,0.15); color: #e8746a; border: 1px solid rgba(232,116,106,0.3); animation: lockPulse 1s infinite; }
        .pc-status.pending { background: rgba(232,184,74,0.15); color: #e8b84a; border: 1px solid rgba(232,184,74,0.3); animation: lockPulse 0.8s infinite; }
        .pc-card .pc-timer {
            font-size: 36px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: #5ba3d9;
            text-align: center;
            padding: 10px 0;
            letter-spacing: 4px;
        }
        .pc-card .pc-timer.warning { color: #e8b84a; }
        .pc-card .pc-timer.danger { color: #e8746a; animation: dangerPulse 0.5s infinite; }
        @keyframes dangerPulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .pc-card .pc-info {
            font-size: 13px;
            color: #5a7a9a;
            text-align: center;
            margin: 8px 0;
        }
        .pc-card .pc-info span { color: #7ab3d9; font-weight: 600; }
        .payment-request {
            background: rgba(232,184,74,0.08);
            border: 1px solid rgba(232,184,74,0.2);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
        }
        .payment-request .amount { color: #e8b84a; font-weight: 700; font-size: 18px; }
        .payment-request .minutes { color: #7ab3d9; font-weight: 600; }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .btn-group.three-buttons {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .btn-action {
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-action:hover { transform: translateY(-2px); }
        .btn-action:active { transform: translateY(1px); }
        .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-unlock { background: linear-gradient(135deg, #2a8a6a, #2ecc71); box-shadow: 0 4px 20px rgba(46,204,113,0.2); }
        .btn-unlock:hover { box-shadow: 0 8px 30px rgba(46,204,113,0.4); }
        .btn-confirm { background: linear-gradient(135deg, #2a6aaa, #5ba3d9); box-shadow: 0 4px 20px rgba(91,163,217,0.2); }
        .btn-confirm:hover { box-shadow: 0 8px 30px rgba(91,163,217,0.4); }
        .btn-decline { background: linear-gradient(135deg, #7a2a2a, #e8746a); box-shadow: 0 4px 20px rgba(232,116,106,0.2); }
        .btn-decline:hover { box-shadow: 0 8px 30px rgba(232,116,106,0.4); }
        .btn-stop { background: linear-gradient(135deg, #5a3a3a, #7a4a4a); box-shadow: 0 4px 20px rgba(122,74,74,0.2); }
        .btn-stop:hover { box-shadow: 0 8px 30px rgba(122,74,74,0.4); }
        .btn-lock { background: linear-gradient(135deg, #7a3a3a, #9a4a4a); box-shadow: 0 4px 20px rgba(154,74,74,0.2); }
        .btn-lock:hover { box-shadow: 0 8px 30px rgba(154,74,74,0.4); }
        .btn-full { grid-column: span 2; }
        .logs-section {
            background: rgba(10,22,40,0.4);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(74,141,183,0.08);
        }
        .logs-section h3 { color: #7ab3d9; margin-bottom: 16px; font-weight: 600; letter-spacing: 1px; }
        .logs-section table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .logs-section th {
            text-align: left;
            color: #5a7a9a;
            font-weight: 600;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(74,141,183,0.08);
        }
        .logs-section td {
            padding: 8px 12px;
            color: #a0b8d0;
            border-bottom: 1px solid rgba(74,141,183,0.04);
        }
        .logs-section tr:hover td { background: rgba(74,141,183,0.04); }
        .online-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .online-status.online { background: #2ecc71; }
        .online-status.offline { background: #5a7a9a; }
        .last-seen { font-size: 11px; color: #3a5a7a; }
        @media (max-width: 650px) {
            .pc-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .brand { font-size: 22px; }
            .btn-group { grid-template-columns: 1fr; }
            .btn-group.three-buttons { grid-template-columns: 1fr; }
            .btn-full { grid-column: span 1; }
            .header-actions { width: 100%; justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="brand">OFW-<span>NET</span> <span style="font-size:16px;font-weight:400;color:#5a7a9a;">Staff Panel</span></div>
            <div class="brand-sub">Remote Control · Payment Management</div>
        </div>
        <div class="header-actions">
            <button class="btn-log" onclick="openLog()">📋 View Session Log</button>
            <button class="btn-log" onclick="shutdownAll()" style="background:linear-gradient(135deg,#7a2a2a,#9a4a4a);">⏻ Shutdown All</button>
            <div class="status-total">
                🖥️ <span id="totalPcs">0</span> PCs · 
                🟢 <span id="onlinePcs">0</span> Online · 
                🔴 <span id="lockedPcs">0</span> Locked ·
                🟡 <span id="pendingPcs">0</span> Pending
            </div>
            <div class="notification-badge" id="notificationBadge" style="display:none;">🔔 New Payment Request</div>
        </div>
    </div>

    <div class="pc-grid" id="pcGrid">
        <div style="grid-column:1/-1;text-align:center;color:#3a5a7a;padding:60px 0;">
            <span style="font-size:48px;display:block;margin-bottom:20px;">🖥️</span>
            No PCs connected yet.<br>
            <span style="font-size:12px;">Make sure client PCs are running.</span>
        </div>
    </div>

    <div class="logs-section">
        <h3>📋 Activity Log</h3>
        <table>
            <thead><tr><th>Time</th><th>PC</th><th>Action</th><th>Amount</th></tr></thead>
            <tbody id="logTableBody">
                <tr><td colspan="4" style="text-align:center;color:#3a5a7a;">No logs yet</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // ============================================================
        // OFW-NET STAFF PANEL - Controls all PCs
        // ============================================================

        const SERVER_URL = "wss://primetech-ofw-net.onrender.com";
        const STAFF_PASSWORD = "ofw123";
        let ws = null;
        let pcs = {};
        let logs = [];

        const pcGrid = document.getElementById('pcGrid');
        const logTableBody = document.getElementById('logTableBody');
        const totalPcsEl = document.getElementById('totalPcs');
        const onlinePcsEl = document.getElementById('onlinePcs');
        const lockedPcsEl = document.getElementById('lockedPcs');
        const pendingPcsEl = document.getElementById('pendingPcs');
        const notificationBadge = document.getElementById('notificationBadge');

        // ============================================================
        // VIEW SESSION LOG - Professional Excel Format
        // ============================================================
function openLog() {
    // Get logs from localStorage
    const log = localStorage.getItem('pisonet_log');
    if (!log || log === 'DateTime,PC,Minutes,AmountPaid,Action\n') {
        alert('📭 No sessions logged yet.');
        return;
    }
    
    // Parse all rows
    const allRows = log.split('\n')
        .filter(line => line.trim() !== '' && !line.startsWith('DateTime'))
        .map(line => {
            const parts = line.split(',');
            if (parts.length >= 5) {
                const dateParts = parts[0].split(' ');
                const dateStr = dateParts[0] || parts[0];
                // Parse date for filtering
                const dateObj = new Date(dateStr);
                return {
                    date: dateStr,
                    dateObj: dateObj,
                    year: dateObj.getFullYear(),
                    month: String(dateObj.getMonth() + 1).padStart(2, '0'),
                    monthYear: `${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()}`,
                    yearOnly: dateObj.getFullYear(),
                    time: dateParts[1] || parts[0],
                    pc: parts[1] || '',
                    minutes: parseInt(parts[2]) || 0,
                    amount: parseInt(parts[3]) || 0,
                    action: parts[4] || 'started'
                };
            }
            return null;
        })
        .filter(row => row !== null);
    
    if (allRows.length === 0) {
        alert('📭 No sessions logged yet.');
        return;
    }
    
    // Get unique values for filters
    const uniquePCs = [...new Set(allRows.map(r => r.pc))];
    const uniqueActions = [...new Set(allRows.map(r => r.action))];
    const uniqueYears = [...new Set(allRows.map(r => r.year))].sort((a, b) => b - a);
    const uniqueMonths = [...new Set(allRows.map(r => r.monthYear))].sort();
    
    // Build filter UI
    let filterHTML = `
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;padding:15px;background:rgba(10,22,40,0.4);border-radius:12px;border:1px solid rgba(74,141,183,0.1);">
            <div style="display:flex;align-items:center;gap:6px;">
                <label style="color:#5a7a9a;font-size:12px;font-weight:600;">📅 Date:</label>
                <input type="date" id="filterDate" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(74,141,183,0.2);background:rgba(10,22,40,0.6);color:#a0b8d0;font-size:12px;">
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <label style="color:#5a7a9a;font-size:12px;font-weight:600;">📆 Month:</label>
                <select id="filterMonth" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(74,141,183,0.2);background:rgba(10,22,40,0.6);color:#a0b8d0;font-size:12px;">
                    <option value="all">All Months</option>
                    ${uniqueMonths.map(m => `<option value="${m}">${m}</option>`).join('')}
                </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <label style="color:#5a7a9a;font-size:12px;font-weight:600;">📅 Year:</label>
                <select id="filterYear" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(74,141,183,0.2);background:rgba(10,22,40,0.6);color:#a0b8d0;font-size:12px;">
                    <option value="all">All Years</option>
                    ${uniqueYears.map(y => `<option value="${y}">${y}</option>`).join('')}
                </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <label style="color:#5a7a9a;font-size:12px;font-weight:600;">🖥️ PC:</label>
                <select id="filterPC" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(74,141,183,0.2);background:rgba(10,22,40,0.6);color:#a0b8d0;font-size:12px;">
                    <option value="all">All PCs</option>
                    ${uniquePCs.map(pc => `<option value="${pc}">${pc}</option>`).join('')}
                </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <label style="color:#5a7a9a;font-size:12px;font-weight:600;">📊 Action:</label>
                <select id="filterAction" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(74,141,183,0.2);background:rgba(10,22,40,0.6);color:#a0b8d0;font-size:12px;">
                    <option value="all">All Actions</option>
                    <option value="started">▶️ Started</option>
                    <option value="added">➕ Added Time</option>
                </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <button class="filter-btn apply" onclick="applyFilters()">Apply</button>
                <button class="filter-btn clear" onclick="clearFilters()">Clear</button>
            </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;padding:8px 12px;background:rgba(10,22,40,0.2);border-radius:8px;border:1px solid rgba(74,141,183,0.05);">
            <span style="color:#5a7a9a;font-size:11px;">💡 <strong>Tip:</strong> Use Date for specific day, Month for monthly summary, Year for annual report. Filters combine together.</span>
        </div>
    `;
    
    // Function to render table with filters
    function renderTable(rows, totalMinutes, totalAmount) {
        if (rows.length === 0) {
            return `
                <div style="text-align:center;padding:40px;color:#5a7a9a;">
                    <span style="font-size:48px;display:block;margin-bottom:16px;">🔍</span>
                    No results match your filters.
                </div>
            `;
        }
        
        let tableHTML = `
            <table style="width:100%;border-collapse:collapse;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;">
                <thead>
                    <tr style="background:#142a4a;color:#5ba3d9;">
                        <th style="padding:10px 12px;border:1px solid #2a4a6a;text-align:left;font-weight:700;">Date</th>
                        <th style="padding:10px 12px;border:1px solid #2a4a6a;text-align:left;font-weight:700;">Time</th>
                        <th style="padding:10px 12px;border:1px solid #2a4a6a;text-align:left;font-weight:700;">PC</th>
                        <th style="padding:10px 12px;border:1px solid #2a4a6a;text-align:center;font-weight:700;">Minutes</th>
                        <th style="padding:10px 12px;border:1px solid #2a4a6a;text-align:center;font-weight:700;">Amount (₱)</th>
                        <th style="padding:10px 12px;border:1px solid #2a4a6a;text-align:center;font-weight:700;">Action</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        rows.forEach((row, index) => {
            const bgColor = index % 2 === 0 ? '#0a1628' : '#0f1f3a';
            const actionDisplay = row.action === 'added' ? '➕ Added Time' : '▶️ Started';
            const actionColor = row.action === 'added' ? '#e8b84a' : '#2ecc71';
            
            tableHTML += `
                <tr style="background:${bgColor};color:#a0b8d0;">
                    <td style="padding:8px 12px;border:1px solid #1a2a4a;">${row.date}</td>
                    <td style="padding:8px 12px;border:1px solid #1a2a4a;">${row.time}</td>
                    <td style="padding:8px 12px;border:1px solid #1a2a4a;color:#7ab3d9;font-weight:600;">${row.pc}</td>
                    <td style="padding:8px 12px;border:1px solid #1a2a4a;text-align:center;">${row.minutes}</td>
                    <td style="padding:8px 12px;border:1px solid #1a2a4a;text-align:center;color:#f39c12;font-weight:600;">₱${row.amount}</td>
                    <td style="padding:8px 12px;border:1px solid #1a2a4a;text-align:center;">
                        <span style="color:${actionColor};">${actionDisplay}</span>
                    </td>
                </tr>
            `;
        });
        
        tableHTML += `
                </tbody>
                <tfoot>
                    <tr style="background:#142a4a;color:#5ba3d9;font-weight:bold;">
                        <td colspan="3" style="padding:10px 12px;border:1px solid #2a4a6a;text-align:right;font-size:14px;">📊 TOTALS:</td>
                        <td style="padding:10px 12px;border:1px solid #2a4a6a;text-align:center;font-size:14px;">${totalMinutes}</td>
                        <td style="padding:10px 12px;border:1px solid #2a4a6a;text-align:center;font-size:14px;color:#f39c12;">₱${totalAmount}</td>
                        <td style="padding:10px 12px;border:1px solid #2a4a6a;text-align:center;"></td>
                    </tr>
                </tfoot>
            </table>
        `;
        return tableHTML;
    }
    
    // Filter function
    function applyFilters() {
        const selectedDate = document.getElementById('filterDate').value;
        const selectedMonth = document.getElementById('filterMonth').value;
        const selectedYear = document.getElementById('filterYear').value;
        const selectedPC = document.getElementById('filterPC').value;
        const selectedAction = document.getElementById('filterAction').value;
        
        let filtered = allRows;
        
        // Filter by specific date (dd/mm/yyyy)
        if (selectedDate) {
            // Convert date input (yyyy-mm-dd) to match stored date format (yyyy-mm-dd)
            filtered = filtered.filter(row => row.date === selectedDate);
        }
        
        // Filter by month (mm/yyyy)
        if (selectedMonth !== 'all') {
            filtered = filtered.filter(row => row.monthYear === selectedMonth);
        }
        
        // Filter by year (yyyy)
        if (selectedYear !== 'all') {
            filtered = filtered.filter(row => row.year === parseInt(selectedYear));
        }
        
        // Filter by PC
        if (selectedPC !== 'all') {
            filtered = filtered.filter(row => row.pc === selectedPC);
        }
        
        // Filter by Action
        if (selectedAction !== 'all') {
            filtered = filtered.filter(row => row.action === selectedAction);
        }
        
        const totalMinutes = filtered.reduce((sum, r) => sum + r.minutes, 0);
        const totalAmount = filtered.reduce((sum, r) => sum + r.amount, 0);
        
        const tableContainer = document.getElementById('tableContainer');
        if (tableContainer) {
            tableContainer.innerHTML = renderTable(filtered, totalMinutes, totalAmount);
        }
    }
    
    function clearFilters() {
        document.getElementById('filterDate').value = '';
        document.getElementById('filterMonth').value = 'all';
        document.getElementById('filterYear').value = 'all';
        document.getElementById('filterPC').value = 'all';
        document.getElementById('filterAction').value = 'all';
        applyFilters();
    }
    
    // Build the log window
    const win = window.open('', '_blank', 'width=1000,height=700,scrollbars=yes');
    win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>OFW-NET Session Log</title>
            <style>
                body {
                    background: #0a1628;
                    padding: 30px;
                    font-family: 'Segoe UI', Arial, sans-serif;
                    min-height: 100vh;
                }
                .log-container {
                    max-width: 1000px;
                    width: 100%;
                    margin: 0 auto;
                    background: rgba(10,22,40,0.8);
                    backdrop-filter: blur(20px);
                    border-radius: 20px;
                    padding: 30px;
                    border: 1px solid rgba(74,141,183,0.12);
                    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
                }
                .log-title {
                    text-align:center;
                    margin-bottom:20px;
                }
                .log-title h2 {
                    color: #5ba3d9;
                    font-size:24px;
                    font-weight:700;
                    letter-spacing:1px;
                }
                .log-title p {
                    color: #5a7a9a;
                    font-size:13px;
                }
                .filter-bar {
                    display:flex;
                    flex-wrap:wrap;
                    gap:10px;
                    margin-bottom:20px;
                    padding:15px;
                    background:rgba(10,22,40,0.4);
                    border-radius:12px;
                    border:1px solid rgba(74,141,183,0.1);
                    align-items:center;
                }
                .filter-bar label {
                    color:#5a7a9a;
                    font-size:12px;
                    font-weight:600;
                }
                .filter-bar input, .filter-bar select {
                    padding:6px 10px;
                    border-radius:8px;
                    border:1px solid rgba(74,141,183,0.2);
                    background:rgba(10,22,40,0.6);
                    color:#a0b8d0;
                    font-size:12px;
                }
                .filter-bar input:focus, .filter-bar select:focus {
                    outline:none;

        function connectWebSocket() {
            try {
                ws = new WebSocket(SERVER_URL);
                
                ws.onopen = function() {
                    console.log('✅ Staff panel connected to server');
                    ws.send(JSON.stringify({ type: 'staff_login', password: STAFF_PASSWORD }));
                };

                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        console.log('📩 Received:', data.type, data);

                        if (data.type === 'pc_status') {
                            console.log('📩 pc_status received:', data);
                            if (!pcs[data.pcId]) {
                                pcs[data.pcId] = { online: true };
                            }
                            const existingPending = pcs[data.pcId].pendingPayment;
                            pcs[data.pcId].status = data.status || 'idle';
                            pcs[data.pcId].timeRemaining = data.timeRemaining || 0;
                            pcs[data.pcId].session = data.session || { minutes: 0, amount: 0 };
                            pcs[data.pcId].pendingPayment = data.pendingPayment || existingPending || null;
                            pcs[data.pcId].online = true;
                            pcs[data.pcId].lastSeen = new Date().toLocaleTimeString();
                            renderPCs();
                            updateStats();
                        }

                        if (data.type === 'pc_offline') {
                            if (pcs[data.pcId]) {
                                pcs[data.pcId].online = false;
                                pcs[data.pcId].lastSeen = new Date().toLocaleTimeString();
                                renderPCs();
                                updateStats();
                            }
                        }

			if (data.type === 'payment_request') {
			    console.log('💰🔥 PAYMENT REQUEST RECEIVED:', data);
			    if (pcs[data.pcId]) {
			        // 🔥 Store the pending payment
			        pcs[data.pcId].pendingPayment = {
			            minutes: data.minutes,
			            amount: data.amount
			        };
			        pcs[data.pcId].status = 'pending';
			        console.log('💰 PC status set to pending:', pcs[data.pcId]);
			        renderPCs();
			        updateStats();
			        playNotification();
			        notificationBadge.style.display = 'inline-block';
			        setTimeout(() => {
			            notificationBadge.style.display = 'none';
			        }, 10000);
			        addLog(data.pcId, '💰 Payment Request', `₱${data.amount} (${data.minutes}min)`);
			    }
			}

                        if (data.type === 'unlock_success') {
                            addLog(data.pcId, '🔓 Unlocked', '-');
                            if (pcs[data.pcId]) {
                                pcs[data.pcId].status = 'idle';
                                pcs[data.pcId].pendingPayment = null;
                                pcs[data.pcId].timeRemaining = 0;
                                renderPCs();
                                updateStats();
                            }
                        }

                        if (data.type === 'log') {
                            addLog(data.pcId, data.action, data.amount || '-');
                        }
                    } catch(e) {
                        console.error('❌ Error parsing message:', e);
                    }
                };

                ws.onclose = function() {
                    console.log('❌ Disconnected, reconnecting in 3s...');
                    setTimeout(connectWebSocket, 3000);
                };

                ws.onerror = function(error) {
                    console.error('❌ WebSocket error:', error);
                    ws.close();
                };
            } catch(e) {
                console.error('❌ Connection failed:', e);
                setTimeout(connectWebSocket, 5000);
            }
        }

function confirmPayment(pcId) {
    console.log('🔑 confirmPayment called for:', pcId);
    
    // 🔥 IMMEDIATELY disable ALL confirm buttons for this PC
    // Use a more specific selector
    const buttons = document.querySelectorAll(`.btn-confirm[onclick*="confirmPayment('${pcId}')"]`);
    buttons.forEach(btn => {
        btn.disabled = true;
        btn.textContent = '⏳ Processing...';
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
    });
    
    // Also disable via ID if available
    const btnById = document.getElementById(`confirmBtn_${pcId}`);
    if (btnById) {
        btnById.disabled = true;
        btnById.textContent = '⏳ Processing...';
        btnById.style.opacity = '0.5';
        btnById.style.cursor = 'not-allowed';
    }
    
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('❌ Not connected to server.');
        // Re-enable buttons
        buttons.forEach(btn => {
            btn.disabled = false;
            btn.textContent = '✅ Confirm';
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        });
        if (btnById) {
            btnById.disabled = false;
            btnById.textContent = '✅ Confirm';
            btnById.style.opacity = '1';
            btnById.style.cursor = 'pointer';
        }
        return;
    }

    const pc = pcs[pcId];
    if (!pc || !pc.pendingPayment) {
        alert('No pending payment for this PC.');
        buttons.forEach(btn => {
            btn.disabled = false;
            btn.textContent = '✅ Confirm';
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        });
        if (btnById) {
            btnById.disabled = false;
            btnById.textContent = '✅ Confirm';
            btnById.style.opacity = '1';
            btnById.style.cursor = 'pointer';
        }
        return;
    }

    const { minutes, amount } = pc.pendingPayment;
    
    const confirmAction = confirm(
        `✅ Confirm payment for ${pcId}?\n\n` +
        `💰 Amount: ₱${amount}\n⏱️ Duration: ${minutes} minutes\n\n` +
        `⚠️ Make sure GCash payment has been received!`
    );
    if (!confirmAction) {
        // Re-enable buttons if user cancels
        buttons.forEach(btn => {
            btn.disabled = false;
            btn.textContent = '✅ Confirm';
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        });
        if (btnById) {
            btnById.disabled = false;
            btnById.textContent = '✅ Confirm';
            btnById.style.opacity = '1';
            btnById.style.cursor = 'pointer';
        }
        return;
    }

    console.log('📤 Sending confirm_payment to server:', { pcId, minutes, amount });
    
    ws.send(JSON.stringify({
        type: 'confirm_payment',
        pcId: pcId,
        minutes: minutes,
        amount: amount
    }));

    addLog(pcId, '✅ Payment Confirmed', `₱${amount}`);
    
    // 🔥 Clear pending payment immediately
    pc.pendingPayment = null;
    pc.status = 'processing';
    renderPCs();
    updateStats();
}

        function declinePayment(pcId) {
            console.log('❌ declinePayment called for:', pcId);
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('❌ Not connected to server.');
                return;
            }

            const pc = pcs[pcId];
            if (!pc || !pc.pendingPayment) {
                alert('No pending payment for this PC.');
                return;
            }

            if (!confirm(`❌ Decline payment request from ${pcId}?`)) return;

            ws.send(JSON.stringify({
                type: 'decline_payment',
                pcId: pcId
            }));

            addLog(pcId, '❌ Payment Declined', '-');
            pc.pendingPayment = null;
            pc.status = 'idle';
            renderPCs();
            updateStats();
        }

        function unlockPC(pcId) {
            console.log('🔓 unlockPC called for:', pcId);
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('❌ Not connected to server.');
                return;
            }

            const pc = pcs[pcId];
            if (!pc) return;

            if (pc.status === 'pending' && pc.pendingPayment) {
                confirmPayment(pcId);
                return;
            }

            const confirmUnlock = confirm(`🔓 Unlock ${pcId}?\n\nMake sure payment has been confirmed!`);
            if (!confirmUnlock) return;

            ws.send(JSON.stringify({
                type: 'unlock',
                pcId: pcId
            }));

            addLog(pcId, '🔓 Unlocked Manually', '-');
        }

        function lockPC(pcId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('❌ Not connected to server.');
                return;
            }

            if (!confirm(`🔒 Lock ${pcId}?`)) return;

            ws.send(JSON.stringify({
                type: 'lock',
                pcId: pcId
            }));

            addLog(pcId, '🔒 Locked Manually', '-');
        }

function stopSession(pcId) {
    console.log('⏹️ stopSession called for:', pcId);
    
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('❌ Not connected to server.');
        return;
    }

    const pc = pcs[pcId];
    if (!pc) {
        alert('❌ PC not found');
        return;
    }

    if (pc.status !== 'running') {
        alert('ℹ️ PC is not currently running a session.');
        return;
    }

    if (!confirm(`⏹️ Stop session on ${pcId}?\n\nThis will end the current session immediately.`)) return;

    console.log('📤 Sending stop_session to server for:', pcId);
    
    ws.send(JSON.stringify({
        type: 'stop_session',
        pcId: pcId
    }));

    // Update local status immediately for better UX
    pc.status = 'idle';
    pc.timeRemaining = 0;
    pc.isRunning = false;
    renderPCs();
    updateStats();
    
    addLog(pcId, '⏹️ Session Stopped (sent)', '-');
}

        function playNotification() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                oscillator.start(ctx.currentTime);
                oscillator.stop(ctx.currentTime + 0.2);
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.value = 1000;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.3, ctx.currentTime);
                    osc2.start(ctx.currentTime);
                    osc2.stop(ctx.currentTime + 0.2);
                }, 300);
            } catch(e) {
                console.log('Audio not available');
            }
        }

    function renderPCs() {

                </div>
            `;
            return;
        }

        let html = '';
        pcIds.forEach(id => {
            const pc = pcs[id];
            const isOnline = pc.online !== false;
            
            const hasPending = pc.pendingPayment !== null && 
                              typeof pc.pendingPayment === 'object' && 
                              pc.pendingPayment.amount > 0;
            
            const timerDisplay = isOnline ? 
                formatTime(pc.timeRemaining || 0) : 
                '--:--';
            
            const timerClass = isOnline ? 
                (pc.status === 'locked' ? 'danger' : 
                 pc.status === 'running' && pc.timeRemaining <= 60 ? 'danger' :
                 pc.status === 'running' && pc.timeRemaining <= 300 ? 'warning' : '') :
                '';
            
            const statusClass = isOnline ? (pc.status || 'idle') : 'offline';
            const statusDisplay = isOnline ? 
                (hasPending ? '🟡 Pending Payment' :
                 pc.status === 'running' ? '🟢 Running' : 
                 pc.status === 'locked' ? '🔴 Locked' :
                 pc.status === 'processing' ? '⏳ Processing...' :
                 '⏸️ Idle') :
                '⚫ Offline';

            html += `
                <div class="pc-card">
                    <div class="pc-header">
                        <span class="pc-name">🖥️ ${id}</span>
                        <span class="pc-status ${statusClass}">
                            <span class="online-status ${isOnline ? 'online' : 'offline'}"></span>
                            ${statusDisplay}
                        </span>
                    </div>
                    <div class="pc-timer ${timerClass}">${timerDisplay}</div>
                    <div class="pc-info">
                        ${isOnline && pc.status === 'running' ? 
                            `⏱️ ${pc.session.minutes} min · ₱${pc.session.amount}` : 
                            hasPending ? 
                            '⏳ Waiting for payment confirmation...' :
                            isOnline && pc.status === 'locked' ? 
                            '🔒 PC locked. Unlock after payment.' :
                            isOnline ? '💡 Ready' : '📡 Disconnected'}
                    </div>
                    ${isOnline && hasPending ? `
                        <div class="payment-request">
                            💰 Payment Request: <span class="amount">₱${pc.pendingPayment.amount}</span>
                            for <span class="minutes">${pc.pendingPayment.minutes} min</span>
                        </div>
                    ` : ''}
                    <div class="btn-group ${isOnline && hasPending ? 'three-buttons' : ''}">
                        ${isOnline ? `
                            ${hasPending ? `
                                <button class="btn-action btn-confirm" onclick="confirmPayment('${id}')" id="confirmBtn_${id}">✅ Confirm</button>
                                <button class="btn-action btn-decline" onclick="declinePayment('${id}')">❌ Decline</button>
                            ` : `
                                <button class="btn-action btn-unlock" onclick="unlockPC('${id}')" 
                                    ${pc.status === 'running' ? 'disabled' : ''}>
                                    🔓 Unlock
                                </button>
                            `}
                            <button class="btn-action btn-stop" onclick="stopSession('${id}')"
                                ${pc.status !== 'running' ? 'disabled' : ''}>
                                ⏹️ Stop
                            </button>
                            <button class="btn-action btn-lock" onclick="lockPC('${id}')"
                                ${pc.status === 'locked' ? 'disabled' : ''}>
                                🔒 Lock
                            </button>
                        ` : `
                            <button class="btn-action" disabled style="grid-column:span 2;background:rgba(90,122,154,0.1);color:#3a5a7a;">Offline</button>
                        `}
                    </div>
                    <div class="pc-info last-seen">
                        ${isOnline ? `Last seen: ${pc.lastSeen || 'just now'}` : 'Offline'}
                    </div>
                </div>
            `;
        });
        pcGrid.innerHTML = html;
    }

    function updateStats() {
        const pcIds = Object.keys(pcs);
        const online = pcIds.filter(id => pcs[id].online !== false);
        const locked = online.filter(id => pcs[id].status === 'locked');
        const pending = online.filter(id => pcs[id].status === 'pending');
        totalPcsEl.textContent = pcIds.length;
        onlinePcsEl.textContent = online.length;
        lockedPcsEl.textContent = locked.length;
        pendingPcsEl.textContent = pending.length;
    }

    function renderLogs() {
        if (logs.length === 0) {
            logTableBody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#3a5a7a;">No logs yet</td></tr>`;
            return;
        }
        let html = '';
        logs.slice(0, 30).forEach(log => {
            html += `
                <tr>
                    <td style="color:#5a7a9a;">${log.time}</td>
                    <td style="color:#7ab3d9;font-weight:600;">${log.pcId}</td>
                    <td>${log.action}</td>
                    <td>${log.amount}</td>
                </tr>
            `;
        });
        logTableBody.innerHTML = html;
    }

    function addLog(pcId, action, amount) {
        logs.unshift({
            time: new Date().toLocaleTimeString(),
            pcId: pcId,
            action: action,
            amount: amount || '-'
        });
        if (logs.length > 50) logs.pop();
        renderLogs();
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }

    // ============================================================
    // INIT
    // ============================================================
    console.log('🚀 Staff panel starting...');
    connectWebSocket();
    addLog('System', '🔄 Staff panel loaded', '-');

    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'refresh' }));
        }
    }, 10000);
</script>

</body>
</html>
