<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFW-NET Client PC</title>
    <style>
        /* ============================================
           DARK BLUE PALETTE - Smooth Gradient Background
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #0a1628 0%, #0f1f3a 25%, #142a4a 50%, #0f1f3a 75%, #0a1628 100%);
            position: relative;
            overflow: hidden;
        }

        .watermark-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            opacity: 1;
            max-width: 120%;
            max-height: 120%;
            object-fit: contain;
            user-select: none;
            animation: watermarkFloat 10s ease-in-out infinite alternate;
            filter: brightness(100%) contrast(1.2);
        }

        @keyframes watermarkFloat {
            0% { transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
            100% { transform: translate(-50%, -50%) scale(1.05) rotate(2deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(10, 22, 40, 0.50);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 38px 42px;
            max-width: 850px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7),
                        0 0 0 1px rgba(74, 141, 183, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(74, 141, 183, 0.12);
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            border-bottom: 1px solid rgba(74, 141, 183, 0.15);
            padding-bottom: 16px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand {
            font-size: 26px;
            font-weight: 800;
            color: #e8f0f8;
            letter-spacing: 1px;
        }

        .brand span {
            color: #5ba3d9;
            text-shadow: 0 0 30px rgba(91, 163, 217, 0.2);
        }

        .brand-sub {
            font-size: 16px;
            color: #5ba3d9;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .pc-id {
            font-size: 14px;
            color: #7ab3d9;
            letter-spacing: 1px;
            margin-top: 2px;
            display: block;
        }

        .status-badge {
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .status-badge.idle {
            background: rgba(90, 122, 154, 0.12);
            border: 1px solid rgba(90, 122, 154, 0.20);
            color: #5a7a9a;
        }

        .status-badge.running {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.30);
            color: #2ecc71;
        }

        .status-badge.locked {
            background: rgba(232, 116, 106, 0.15);
            border: 1px solid rgba(232, 116, 106, 0.30);
            color: #e8746a;
            animation: lockPulse 1s ease-in-out infinite;
        }

        .status-badge.pending {
            background: rgba(232, 184, 74, 0.15);
            border: 1px solid rgba(232, 184, 74, 0.30);
            color: #e8b84a;
            animation: lockPulse 0.8s ease-in-out infinite;
        }

        @keyframes lockPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #7ab3d9;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5a7a9a;
            transition: all 0.3s ease;
        }

        .connection-dot.online {
            background: #2ecc71;
            box-shadow: 0 0 14px rgba(46, 204, 113, 0.3);
        }

        .connection-dot.offline {
            background: #e8746a;
            box-shadow: 0 0 14px rgba(232, 116, 106, 0.3);
            animation: lockPulse 1s infinite;
        }

        .qr-timer-row {
            display: flex;
            gap: 20px;
            margin-bottom: 22px;
            align-items: stretch;
        }

        .qr-section {
            flex: 0 0 45%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(74, 141, 183, 0.08);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-section img {
            width: 220px;
            height: 220px;
            border-radius: 14px;
            background: white;
            padding: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .qr-section img:hover {
            transform: scale(1.02);
        }

        .qr-label {
            font-size: 15px;
            font-weight: 600;
            color: #5ba3d9;
            margin-top: 12px;
            background: rgba(91, 163, 217, 0.08);
            padding: 6px 28px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(91, 163, 217, 0.12);
            letter-spacing: 0.5px;
        }

        .timer-display {
            flex: 1;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 18px;
            padding: 20px 25px;
            text-align: center;
            border: 1px solid rgba(74, 141, 183, 0.06);
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .timer-display .time {
            font-size: 80px;
            font-weight: 700;
            color: #5ba3d9;
            font-family: 'Courier New', monospace;
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(91, 163, 217, 0.12);
            line-height: 1.1;
            transition: all 0.5s ease;
        }

        .timer-display .time.warning {
            color: #e8b84a;
            text-shadow: 0 0 40px rgba(232, 184, 74, 0.15);
            animation: warningPulse 1s ease-in-out infinite;
        }

        .timer-display .time.danger {
            color: #e8746a;
            text-shadow: 0 0 40px rgba(232, 116, 106, 0.20);
            animation: dangerPulse 0.5s ease-in-out infinite;
        }

        @keyframes warningPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }

        @keyframes dangerPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
        }

        .timer-display .status {
            font-size: 16px;
            color: #5a7a9a;
            font-weight: 500;
            margin-top: 6px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .timer-display .status.locked-text {
            color: #e8746a;
            font-weight: 700;
            animation: lockPulse 1s ease-in-out infinite;
        }

        .timer-display .status.active {
            color: #5ba3d9;
        }

        .timer-display .status.warning-text {
            color: #e8b84a;
            font-weight: 700;
            animation: warningPulse 1s ease-in-out infinite;
        }

        .timer-display .status.danger-text {
            color: #e8746a;
            font-weight: 700;
            animation: dangerPulse 0.5s ease-in-out infinite;
        }

        .payment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-payment {
            padding: 15px 8px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            color: white;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .btn-payment::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
            pointer-events: none;
        }

        .btn-payment:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .btn-payment:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-payment:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-payment .price {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.85;
            display: block;
            margin-top: 2px;
        }

        .btn-payment .status-icon {
            font-size: 14px;
            display: block;
            margin-top: 4px;
        }

        .pay-15 { 
            background: linear-gradient(135deg, #1a3a5a, #2a5a7a); 
            box-shadow: 0 6px 20px rgba(42, 90, 122, 0.25);
        }
        .pay-30 { 
            background: linear-gradient(135deg, #1a4a7a, #2a6aaa); 
            box-shadow: 0 6px 20px rgba(42, 106, 170, 0.25);
        }
        .pay-60 { 
            background: linear-gradient(135deg, #1a6a4a, #2a8a6a); 
            box-shadow: 0 6px 20px rgba(42, 138, 106, 0.25);
        }
        .pay-120 { 
            background: linear-gradient(135deg, #8a5a1a, #aa7a2a); 
            box-shadow: 0 6px 20px rgba(170, 122, 42, 0.25);
        }

        .btn-payment.pending {
            animation: pendingPulse 0.8s ease-in-out infinite;
        }

        @keyframes pendingPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.97); }
        }

        .status-msg {
            text-align: center;
            padding: 13px 18px;
            border-radius: 14px;
            font-weight: 500;
            margin-top: 14px;
            font-size: 13px;
            min-height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #5a7a9a;
            transition: all 0.4s ease;
        }

        .status-msg.running {
            background: rgba(91, 163, 217, 0.06);
            border-color: rgba(91, 163, 217, 0.12);
            color: #7ab3d9;
        }

        .status-msg.waiting {
            background: rgba(232, 184, 74, 0.05);
            border-color: rgba(232, 184, 74, 0.08);
            color: #c8a84a;
        }

        .status-msg.ended {
            background: rgba(232, 116, 106, 0.06);
            border-color: rgba(232, 116, 106, 0.10);
            color: #d87a6a;
        }

        .status-msg.pending-msg {
            background: rgba(232, 184, 74, 0.10);
            border-color: rgba(232, 184, 74, 0.20);
            color: #e8b84a;
            animation: lockPulse 0.8s ease-in-out infinite;
        }

        .status-msg.locked-msg {
            background: rgba(232, 116, 106, 0.10);
            border-color: rgba(232, 116, 106, 0.20);
            color: #e8746a;
            animation: lockPulse 1s ease-in-out infinite;
        }

        .status-msg.success-msg {
            background: rgba(46, 204, 113, 0.10);
            border-color: rgba(46, 204, 113, 0.20);
            color: #2ecc71;
        }

        .status-msg.warning-msg {
            background: rgba(232, 184, 74, 0.10);
            border-color: rgba(232, 184, 74, 0.20);
            color: #e8b84a;
            animation: warningPulse 1s ease-in-out infinite;
        }

        .status-msg.danger-msg {
            background: rgba(232, 116, 106, 0.12);
            border-color: rgba(232, 116, 106, 0.25);
            color: #e8746a;
            animation: dangerPulse 0.5s ease-in-out infinite;
        }

        /* ============================================
           NEW FOOTER - Four Lines
           ============================================ */
        .footer {
            text-align: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(74, 141, 183, 0.06);
            font-size: 11px;
            color: #3a5a7a;
            line-height: 1.8;
        }

        .footer .tagline-main {
            font-size: 15px;
            font-weight: 400;
            font-style: italic;
            color: #7ab3d9;
            letter-spacing: 0.5px;
            text-shadow: 0 0 30px rgba(91, 163, 217, 0.08);
        }

        .footer .tagline-main span {
            color: #e8b84a;
            font-style: italic;
        }

        .footer .copyright {
            font-size: 12px;
            color: #5a7a9a;
            letter-spacing: 1px;
        }

        .footer .copyright span {
            color: #5ba3d9;
            font-weight: 600;
        }

        .footer .rights {
            font-size: 12px;
            color: #5a7a9a;
            letter-spacing: 0.5px;
        }

        .footer .version {
            font-size: 11px;
            color: #5a7a9a;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .qr-timer-row {
                flex-direction: column;
                align-items: center;
            }
            
            .qr-section {
                flex: 1 1 auto;
                width: 100%;
            }
            
            .qr-section img {
                width: 180px;
                height: 180px;
            }
            
            .timer-display .time {
                font-size: 56px;
                letter-spacing: 4px;
            }
            
            .container {
                padding: 24px;
                max-width: 100%;
            }

            .watermark-image {
                max-width: 80%;
                max-height: 40%;
            }
        }

        @media (max-width: 650px) {
            .container { padding: 20px; }
            .timer-display .time { font-size: 44px; letter-spacing: 4px; }
            .payment-grid { grid-template-columns: 1fr 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .brand { font-size: 20px; }
            .qr-section img { width: 150px; height: 150px; }
            .watermark-image { max-width: 80%; max-height: 40%; }
            .footer .tagline-main { font-size: 13px; }
        }

        @media (max-width: 400px) {
            .payment-grid { grid-template-columns: 1fr 1fr; }
            .container { padding: 16px; }
            .timer-display .time { font-size: 36px; }
            .watermark-image { max-width: 90%; max-height: 35%; }
            .qr-section img { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <img src="your_logo_watermark.png" alt="OFW-NET Logo" class="watermark-image">

    <div class="container">
        <div class="header">
            <div class="logo-section">
                <img src="your_logo_watermark.png" alt="OFW-NET Logo" style="width: 100px; height: 100px; border-radius: 12px; object-fit: cover;">
                <div>
                    <div class="brand">OFW-<span>NET</span></div>
                    <div class="brand-sub">Pisonet System · GCash</div>
                    <span class="pc-id" id="pcIdDisplay">🖥️ PC #1</span>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="connection-status">
                    <span class="connection-dot" id="connectionDot"></span>
                    <span id="connectionText">Connecting...</span>
                </div>
                <div class="status-badge idle" id="statusBadge">● Idle</div>
            </div>
        </div>

        <div class="qr-timer-row">
            <div class="qr-section">
                <img id="qrImage" src="your_gcash_qr.png" alt="GCash QR Code" 
                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%230a1628%22/%3E%3Ctext x=%2250%22 y=%22110%22 font-size=%2220%22 fill=%22%235ba3d9%22 font-family=%22sans-serif%22%3EPLACE QR%3C/text%3E%3Ctext x=%2245%22 y=%22140%22 font-size=%2216%22 fill=%22%233a5a7a%22 font-family=%22sans-serif%22%3EHERE%3C/text%3E%3C/svg%3E'">
                <div class="qr-label">📱 Scan to Pay via GCash</div>
            </div>

            <div class="timer-display">
                <div class="time" id="timerDisplay">00:00</div>
                <div class="status" id="statusText">⏳ Waiting for customer...</div>
            </div>
        </div>

        <!-- Payment Buttons: 15 min, 30 min, 1 Hour, 2 Hours -->
        <div class="payment-grid">
            <button class="btn-payment pay-15" id="pay15" onclick="requestPayment(15, 5)">
                15 min
                <span class="price">₱5</span>
                <span class="status-icon" id="status15">📤</span>
            </button>
            <button class="btn-payment pay-30" id="pay30" onclick="requestPayment(30, 10)">
                30 min
                <span class="price">₱10</span>
                <span class="status-icon" id="status30">📤</span>
            </button>
            <button class="btn-payment pay-60" id="pay60" onclick="requestPayment(60, 20)">
                1 Hour
                <span class="price">₱20</span>
                <span class="status-icon" id="status60">📤</span>
            </button>
            <button class="btn-payment pay-120" id="pay120" onclick="requestPayment(120, 35)">
                2 Hours
                <span class="price">₱35</span>
                <span class="status-icon" id="status120">📤</span>
            </button>
        </div>

        <div class="status-msg waiting" id="statusMsg">
            💡 Select payment → Confirm → Staff unlocks PC
        </div>

        <!-- New Footer: Four Lines -->
        <div class="footer">
            <div class="tagline-main">
                "Elevate Your Gaming Style <span>To Premium</span>"
            </div>
            <div class="copyright">
                ©2026 <span>PrimeTech Outlet</span>
            </div>
            <div class="rights">
                All Rights Reserved
            </div>
            <div class="version">
                v2.0 · OFW-NET
            </div>
        </div>
    </div>

<script>
    // ============================================================
    // OFW-NET CLIENT PC - Sends Payment Requests to Staff Panel
    // ============================================================

    const PC_ID = "PC4";  // Change to PC1, PC2, PC3, etc.
    const SERVER_URL = "wss://ofw-net-server-i8zh.onrender.com";

    // ============================================================
    // ALARM SYSTEM - 5 Minute Warning
    // ============================================================
    let alarmInterval = null;
    let alarmStarted = false;

    function playWarningAlarm() {
        if (alarmStarted) return;
        alarmStarted = true;
        console.log('🔊 5-MINUTE WARNING ALARM!');
        let alarmCount = 0;
        const maxBeeps = 20;
        alarmInterval = setInterval(() => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'square';
                gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                oscillator.start(ctx.currentTime);
                oscillator.stop(ctx.currentTime + 0.3);
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.value = 1000;
                    osc2.type = 'square';
                    gain2.gain.setValueAtTime(0.2, ctx.currentTime);
                    osc2.start(ctx.currentTime);
                    osc2.stop(ctx.currentTime + 0.2);
                }, 200);
            } catch(e) {
                console.log('🔊 BEEP! 5 minutes remaining!');
            }
            alarmCount++;
            if (alarmCount >= maxBeeps) {
                clearInterval(alarmInterval);
                alarmInterval = null;
                console.log('🔇 Alarm stopped after 1 minute');
            }
        }, 3000);
    }

    function stopAlarm() {
        if (alarmInterval) {
            clearInterval(alarmInterval);
            alarmInterval = null;
            alarmStarted = false;
            console.log('🔇 Alarm stopped');
        }
    }

    // ============================================================
    // STATE VARIABLES
    // ============================================================
    let timerInterval = null;
    let timeRemaining = 0;
    let isRunning = false;
    let isLocked = false;
    let isPending = false;
    let currentSession = { minutes: 0, amount: 0 };
    let ws = null;
    let isConnected = false;
    let reconnectAttempts = 0;

    // ============================================================
    // DOM ELEMENTS
    // ============================================================
    const timerDisplay = document.getElementById('timerDisplay');
    const statusText = document.getElementById('statusText');
    const statusMsg = document.getElementById('statusMsg');
    const statusBadge = document.getElementById('statusBadge');
    const pcIdDisplay = document.getElementById('pcIdDisplay');
    const connectionDot = document.getElementById('connectionDot');
    const connectionText = document.getElementById('connectionText');

    pcIdDisplay.textContent = `🖥️ ${PC_ID}`;

    const payButtons = {
        15: { btn: document.getElementById('pay15'), status: document.getElementById('status15') },
        30: { btn: document.getElementById('pay30'), status: document.getElementById('status30') },
        60: { btn: document.getElementById('pay60'), status: document.getElementById('status60') },
        120: { btn: document.getElementById('pay120'), status: document.getElementById('status120') }
    };

    // ============================================================
    // UI UPDATE FUNCTION
    // ============================================================
    function updateUI() {
        if (isLocked) {
            statusBadge.className = 'status-badge locked';
            statusBadge.textContent = '● LOCKED';
            statusMsg.textContent = '🔒 PC LOCKED! Please pay to continue.';
            statusMsg.className = 'status-msg locked-msg';
            statusText.textContent = '🔴 Session ended - LOCKED';
            statusText.className = 'status locked-text';
        } else if (isRunning) {
            statusBadge.className = 'status-badge running';
            statusBadge.textContent = '● Running';
            statusMsg.textContent = `⏱️ Timer running... ${Math.floor(timeRemaining / 60)} minutes remaining.`;
            statusMsg.className = 'status-msg running';
            statusText.textContent = `🟢 Session running: ${currentSession.minutes} min · ₱${currentSession.amount}`;
            statusText.className = 'status active';
        } else {
            statusBadge.className = 'status-badge idle';
            statusBadge.textContent = '● Idle';
            statusMsg.textContent = '💡 Select payment → Confirm → Staff unlocks PC';
            statusMsg.className = 'status-msg waiting';
            statusText.textContent = '⏳ Waiting for customer...';
            statusText.className = 'status';
        }
    }

    // ============================================================
    // STATE PERSISTENCE
    // ============================================================
    function saveState() {
        const state = {
            timeRemaining: timeRemaining,
            isRunning: isRunning,
            isLocked: isLocked,
            currentSession: currentSession,
            lastUpdated: Date.now()
        };
        localStorage.setItem(`pisonet_state_${PC_ID}`, JSON.stringify(state));
    }

    function loadState() {
        const saved = localStorage.getItem(`pisonet_state_${PC_ID}`);
        if (saved) {
            try {
                const state = JSON.parse(saved);
                const elapsed = (Date.now() - state.lastUpdated) / 1000;
                if (elapsed < 300) {
                    timeRemaining = state.timeRemaining;
                    isRunning = state.isRunning;
                    isLocked = state.isLocked;
                    currentSession = state.currentSession;
                    if (isRunning && timeRemaining > 0) {
                        const elapsedSeconds = Math.floor(elapsed);
                        timeRemaining = Math.max(0, timeRemaining - elapsedSeconds);
                        if (timeRemaining <= 0) {
                            isRunning = false;
                            isLocked = true;
                        }
                    }
                    updateDisplay();
                    updateUI();
                    console.log('✅ State restored successfully');
                    return true;
                }
            } catch(e) {
                console.error('❌ Error loading state:', e);
            }
        }
        return false;
    }

    // ============================================================
    // WEBSOCKET CONNECTION
    // ============================================================
    function connectWebSocket() {
        try {
            console.log('🔌 Connecting to server:', SERVER_URL);
            ws = new WebSocket(SERVER_URL);
            
            ws.onopen = function() {
                console.log('✅ WebSocket connected!');
                isConnected = true;
                connectionDot.className = 'connection-dot online';
                connectionText.textContent = 'Online';
                reconnectAttempts = 0;
                const registerMsg = {
                    type: 'register',
                    pcId: PC_ID,
                    status: isLocked ? 'locked' : (isRunning ? 'running' : 'idle'),
                    timeRemaining: timeRemaining
                };
                ws.send(JSON.stringify(registerMsg));
                console.log('📤 Sent register:', registerMsg);
            };

ws.onmessage = function(event) {
    try {
        const data = JSON.parse(event.data);
        console.log('📩 Received from server:', data);

        // 🔥 Handle start_session FIRST
        if (data.type === 'start_session') {
            console.log('🔥🔥🔥 RECEIVED START_SESSION! 🔥🔥🔥');
            console.log('📊 Data:', data);
            if (data.pcId === PC_ID) {
                console.log('✅ This start_session is for ME (PC1)!');
                // 🔥 Start the session immediately
                startSession(data.minutes, data.amount);
            } else {
                console.log('⚠️ start_session is for another PC:', data.pcId);
            }
            return;
        }

        if (data.type === 'unlock') {
            console.log('🔓 Received unlock command!');
            if (data.pcId === PC_ID) {
                console.log('✅ Unlock is for ME (PC1)!');
                unlockPC();
            }
            return;
        }

        if (data.type === 'stop_session') {
            console.log('⏹️ Received stop_session command!');
            if (data.pcId === PC_ID) {
                stopTimer();
            }
            return;
        }

        if (data.type === 'payment_declined') {
            console.log('❌ Payment declined');
            if (data.pcId === PC_ID) {
                isPending = false;
                resetPaymentButtons();
                statusMsg.textContent = '❌ Payment request declined by staff. Please try again.';
                statusMsg.className = 'status-msg ended';
            }
            return;
        }

        if (data.type === 'ping') {
            console.log('🏓 Ping received, sending pong');
            ws.send(JSON.stringify({
                type: 'pong',
                pcId: PC_ID,
                status: isLocked ? 'locked' : (isRunning ? 'running' : 'idle'),
                timeRemaining: timeRemaining
            }));
            return;
        }

        if (data.type === 'shutdown') {
            console.log('⏻ Shutdown command received!');
            alert('⏻ PC will shut down in 10 seconds. Please save your work!');
            setTimeout(() => {
                window.close();
            }, 10000);
            return;
        }

        // 🔥 If we get here, we received an unknown message type
        console.log('⚠️ Unknown message type:', data.type);

    } catch(e) {
        console.error('❌ Error parsing message:', e);
    }
};

            ws.onclose = function(event) {
                console.log('❌ Disconnected. Code:', event.code);
                isConnected = false;
                connectionDot.className = 'connection-dot offline';
                connectionText.textContent = 'Offline - Reconnecting...';
                reconnectAttempts++;
                const delay = Math.min(30000, 1000 * Math.pow(2, Math.min(reconnectAttempts, 5)));
                console.log(`🔄 Reconnecting in ${delay}ms...`);
                setTimeout(connectWebSocket, delay);
            };

            ws.onerror = function(error) {
                console.error('❌ WebSocket error:', error);
                ws.close();
            };
        } catch(e) {
            console.error('❌ Connection failed:', e);
            setTimeout(connectWebSocket, 5000);
        }
    }

    function sendStatus() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            const statusMsg = {
                type: 'status',
                pcId: PC_ID,
                status: isLocked ? 'locked' : (isRunning ? 'running' : 'idle'),
                timeRemaining: timeRemaining,
                session: currentSession
            };
            ws.send(JSON.stringify(statusMsg));
        }
    }

    // ============================================================
    // PAYMENT REQUEST
    // ============================================================
    function requestPayment(minutes, amount) {
        console.log('💰 Requesting payment:', minutes, amount);
        if (isLocked) {
            alert('🔒 PC is locked. Please wait for staff to unlock.');
            return;
        }
        if (isPending) {
            alert('⏳ Payment request already sent. Please wait for staff to confirm.');
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert('❌ Not connected to server. Please check your internet connection.');
            return;
        }
        const confirmPay = confirm(
            `💰 Amount: ₱${amount}\n⏱️ Duration: ${minutes} minutes\n\n` +
            `✅ Confirm you have scanned the QR code and paid via GCash?`
        );
        if (!confirmPay) return;

        isPending = true;
        const buttonKey = minutes;
        if (payButtons[buttonKey]) {
            payButtons[buttonKey].btn.disabled = true;
            payButtons[buttonKey].status.textContent = '⏳';
            payButtons[buttonKey].btn.classList.add('pending');
        }

        statusMsg.textContent = `⏳ Payment request sent to staff for ₱${amount} (${minutes} min). Please wait...`;
        statusMsg.className = 'status-msg pending-msg';
        statusBadge.className = 'status-badge pending';
        statusBadge.textContent = '● Pending';

        const requestMsg = {
            type: 'payment_request',
            pcId: PC_ID,
            minutes: minutes,
            amount: amount
        };
        ws.send(JSON.stringify(requestMsg));
        console.log('📤 Sent payment request:', requestMsg);
        saveState();
    }

    function resetPaymentButtons() {
        Object.keys(payButtons).forEach(key => {
            if (payButtons[key]) {
                payButtons[key].btn.disabled = false;
                payButtons[key].status.textContent = '📤';
                payButtons[key].btn.classList.remove('pending');
            }
        });
        isPending = false;
        saveState();
    }

    // ============================================================
    // UNLOCK PC
    // ============================================================
    function unlockPC() {
        console.log('🔓 Unlocking PC...');
        isLocked = false;
        isPending = false;
        statusMsg.textContent = '✅ PC unlocked by staff! Ready for session.';
        statusMsg.className = 'status-msg success-msg';
        statusBadge.className = 'status-badge idle';
        statusBadge.textContent = '● Idle';
        statusText.textContent = '⏳ Waiting for customer...';
        statusText.className = 'status';
        timerDisplay.classList.remove('warning', 'danger');
        timerDisplay.textContent = '00:00';
        resetPaymentButtons();
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        sendStatus();
        saveState();
    }

// ============================================================
// TIMER FUNCTIONS
// ============================================================
function startSession(minutes, amount) {
    console.log('🔥🔥🔥 START SESSION CALLED! 🔥🔥🔥');
    console.log('Minutes:', minutes, 'Amount:', amount);
    console.log('Current timeRemaining:', timeRemaining);
    console.log('Current isRunning:', isRunning);
    
    // 🔥 STOP any existing timer FIRST
    if (timerInterval) {
        console.log('⏹️ Clearing existing timer interval');
        clearInterval(timerInterval);
        timerInterval = null;
    }
    
    // 🔥 Add to existing time instead of resetting
    if (isRunning && timeRemaining > 0) {
        // Add the new time to the existing remaining time
        timeRemaining += minutes * 60;
        currentSession.minutes += minutes;
        currentSession.amount += amount;
        console.log(`➕ Added ${minutes}min to existing timer. New total: ${Math.floor(timeRemaining/60)}min`);
        
        logSession(minutes, amount, 'added');
        
        statusText.textContent = `🟢 Session running: ${currentSession.minutes} min total · ₱${currentSession.amount} total`;
        statusMsg.textContent = `⏱️ Added ${minutes} minutes! Total ${Math.floor(timeRemaining/60)} minutes remaining.`;
        statusMsg.className = 'status-msg running';
        updateDisplay();
        sendStatus();
        saveState();
        
        // 🔥 RESTART the timer with the new time
        startTimerInterval();
        return;
    }
     
    // If no timer is running or timer is locked, start fresh
    if (isLocked) {
        isLocked = false;
    }
    
    currentSession = { minutes, amount };
    timeRemaining = minutes * 60;
    isRunning = true;
    isPending = false;
    resetPaymentButtons();
    
    statusText.textContent = `🟢 Session running: ${minutes} min · ₱${amount}`;
    statusText.className = 'status active';
    statusMsg.textContent = `⏱️ Timer running... ${minutes} minutes remaining.`;
    statusMsg.className = 'status-msg running';
    statusBadge.className = 'status-badge running';
    statusBadge.textContent = '● Running';
    
    logSession(minutes, amount, 'started');
    updateDisplay();
    sendStatus();
    saveState();
    
    // 🔥 START the timer interval
    console.log('▶️ Calling startTimerInterval from startSession');
    startTimerInterval();
}

function startTimerInterval() {
    // 🔥 Clear any existing interval first
    if (timerInterval) {
        console.log('⏹️ Clearing old interval before starting new one');
        clearInterval(timerInterval);
        timerInterval = null;
    }
    
    console.log('▶️ Starting new timer interval. timeRemaining:', timeRemaining);
    console.log('▶️ isRunning:', isRunning);
    
    // 🔥 If timeRemaining is 0 or less, don't start
    if (timeRemaining <= 0) {
        console.log('⚠️ timeRemaining is 0, not starting timer');
        isRunning = false;
        isLocked = true;
        updateUI();
        return;
    }
    
    // 🔥 Set isRunning to true
    isRunning = true;
    updateUI();
    
    // 🔥 Start the timer
    timerInterval = setInterval(function() {
        // Only decrement if running
        if (isRunning && timeRemaining > 0) {
            timeRemaining--;
            console.log('⏱️ Tick: timeRemaining =', timeRemaining);
            updateDisplay();
            checkWarnings();
            saveState();
            
            if (timeRemaining <= 0) {
                console.log('⏰ Time is up!');
                clearInterval(timerInterval);
                timerInterval = null;
                isRunning = false;
                isLocked = true;
                timerDisplay.textContent = '00:00';
                statusText.textContent = '🔴 Session ended - LOCKED';
                statusText.className = 'status locked-text';
                statusMsg.textContent = '🔒 PC LOCKED! Please pay to continue.';
                statusMsg.className = 'status-msg locked-msg';
                statusBadge.className = 'status-badge locked';
                statusBadge.textContent = '● LOCKED';
                stopAlarm();
                alarmStarted = false;
                sendStatus();
                saveState();
            }
            sendStatus();
        } else if (timeRemaining <= 0) {
            // If timeRemaining is 0, stop the timer
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            isLocked = true;
            updateUI();
            sendStatus();
            saveState();
        }
    }, 1000);
    
    console.log('✅ Timer interval started. ID:', timerInterval);
}

    // ============================================================
    // STOP TIMER
    // ============================================================
    function stopTimer() {
        console.log('⏹️ Stopping timer...');
        stopAlarm();
        alarmStarted = false;
        if (isPending) {
            if (!confirm('⏳ Payment request pending. Cancel it?')) return;
            isPending = false;
            resetPaymentButtons();
        }
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        isRunning = false;
        timeRemaining = 0;
        isLocked = false;
        updateDisplay();
        timerDisplay.textContent = '00:00';
        timerDisplay.classList.remove('warning', 'danger');
        statusText.textContent = '⏳ Waiting for customer...';
        statusText.className = 'status';
        statusMsg.textContent = '🔄 Timer reset. Ready for next customer.';
        statusMsg.className = 'status-msg waiting';
        statusBadge.className = 'status-badge idle';
        statusBadge.textContent = '● Idle';
        resetPaymentButtons();
        sendStatus();
        saveState();
    }

    // ============================================================
    // HELPER FUNCTIONS
    // ============================================================
    function updateDisplay() {
        const mins = Math.floor(timeRemaining / 60);
        const secs = timeRemaining % 60;
        timerDisplay.textContent = 
            `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        timerDisplay.classList.remove('warning', 'danger');
        if (timeRemaining <= 60 && timeRemaining > 0) {
            timerDisplay.classList.add('danger');
        } else if (timeRemaining <= 300 && timeRemaining > 0) {
            timerDisplay.classList.add('warning');
        }
        if (isRunning) {
            if (timeRemaining <= 60 && timeRemaining > 0) {
                statusText.textContent = '🔴 URGENT: Less than 1 minute remaining!';
                statusText.className = 'status danger-text';
            } else if (timeRemaining <= 300 && timeRemaining > 0) {
                statusText.textContent = `⚠️ ${Math.ceil(timeRemaining / 60)} minutes remaining!`;
                statusText.className = 'status warning-text';
            } else {
                statusText.textContent = `🟢 Session running: ${currentSession.minutes} min · ₱${currentSession.amount}`;
                statusText.className = 'status active';
            }
        }
    }

    function checkWarnings() {
        if (timeRemaining === 300 && isRunning) {
            statusMsg.textContent = '⚠️⚠️⚠️ 5 MINUTES REMAINING! ⚠️⚠️⚠️';
            statusMsg.className = 'status-msg warning-msg';
            playWarningAlarm();
        }
        if (timeRemaining === 60 && isRunning) {
            statusMsg.textContent = '🔴🔴🔴 1 MINUTE REMAINING! FINISH YOUR GAME! 🔴🔴🔴';
            statusMsg.className = 'status-msg danger-msg';
            stopAlarm();
            playBeep(5, 200);
        }
    }

    function playBeep(count = 1, delay = 300) {
        try {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.15);
                }, i * delay);
            }
        } catch(e) {}
    }

    function logSession(minutes, amount, action = 'started') {
        const now = new Date();
        const dateStr = now.toISOString().slice(0,10) + ' ' + now.toTimeString().slice(0,8);
        const logLine = `${dateStr},${PC_ID},${minutes},${amount},${action}\n`;
        let log = localStorage.getItem('pisonet_log') || 'DateTime,PC,Minutes,AmountPaid,Action\n';
        log += logLine;
        localStorage.setItem('pisonet_log', log);
        console.log('📝 Logged session:', logLine.trim());
    }

    // ============================================================
    // INIT
    // ============================================================
    console.log('🚀 OFW-NET Client PC starting...');
    console.log('📡 PC_ID:', PC_ID);
    console.log('🔗 SERVER_URL:', SERVER_URL);

    const stateRestored = loadState();

    if (!stateRestored) {
        updateDisplay();
        updateUI();
    }

    connectWebSocket();

    setInterval(() => {
        sendStatus();
        saveState();
    }, 2000);

    window.addEventListener('beforeunload', function() {
        console.log('👋 Page closing, saving state...');
        saveState();
        if (timerInterval) clearInterval(timerInterval);
        if (ws) ws.close();
    });
</script>
